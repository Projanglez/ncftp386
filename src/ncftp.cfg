/*
   NCFTP386 - mTCP compile-time configuration (CFG_H)

   Every mTCP header does `#include CFG_H`. This file is included via
   -DCFG_H="ncftp.cfg" (see MAKEFILE) and must be on the include
   path (-I./src).

   Template: mtcp/APPS/FTP/FTP.CFG (trimmed down to what's needed).
   Notes:
     - Use only #defines
     - All times in milliseconds
*/

#ifndef CONFIG_H
#define CONFIG_H


/* Program name for mTCP trace output (e.g. Utils.cpp version banner,
   #ifndef NOTRACE). Must be defined as long as tracing isn't disabled
   via NOTRACE. */
#define MTCP_PROGRAM_NAME "ftp4dos"


/* Global options (tracing, SLEEP_CALLS). Lives in mtcp/TCPINC. */
#include "Global.Cfg"


/* mTCP 2025-01-10: Global.Cfg already sets many of the following values.
   Undefine them before overriding locally -> no macro redefinition
   warnings (pattern from mtcp/APPS/FTP/FTP.CFG). #undef of an
   undefined macro is a harmless no-op. */
#undef PKT_DUMP_BYTES
#undef PACKET_BUFFERS
#undef PACKET_BUFFER_LEN
#undef ARP_MAX_ENTRIES
#undef ARP_MAX_PENDING
#undef ARP_RETRIES
#undef ARP_TIMEOUT
#undef IP_MAX_FRAG_PACKETS
#undef IP_MAX_FRAGS_PER_PACKET
#undef IP_BIGPACKET_SIZE
#undef IP_FRAG_REASSEMBLY_TIMEOUT
#undef TCP_MAX_SOCKETS
#undef TCP_MAX_XMIT_BUFS
#undef TCP_SOCKET_RING_SIZE
#undef TCP_CLOSE_TIMEOUT
#undef UDP_MAX_CALLBACKS
#undef DNS_MAX_NAME_LEN
#undef DNS_MAX_ENTRIES
#undef DNS_HANDLER_PORT
#undef DNS_RECURSION_DESIRED
#undef DNS_INITIAL_SEND_TIMEOUT
#undef DNS_RETRY_THRESHOLD
#undef DNS_TIMEOUT


/* Which protocols are compiled in.
   ARP is mandatory for IP->MAC resolution: since 2025-01-10, IP.cpp gates
   the send path via COMPILE_ARP (reference: mtcp/APPS/FTP/FTP.CFG).
   DNS needs UDP; FTP needs TCP. ICMP (ping) is not needed. */
#define COMPILE_ARP
#define COMPILE_UDP
#define COMPILE_TCP
#define COMPILE_DNS


/* Tracing: allow it locally (off) unless disabled globally. */
#if !defined(NOTRACE)
#undef NOTRACE
/* #define NOTRACE */
#endif

#define PKT_DUMP_BYTES (256)


/* Packet layer */
#define PACKET_BUFFERS      (20)    /* incoming buffers              */
#define PACKET_BUFFER_LEN (1514)    /* size per buffer (Ethernet)    */


/* ARP */
#define ARP_MAX_ENTRIES  (10)       /* ARP cache size                */
#define ARP_MAX_PENDING   (5)       /* max. open requests            */
#define ARP_RETRIES       (3)       /* total attempts                */
#define ARP_TIMEOUT   (500ul)       /* time between attempts         */


/* IP (with fragment reassembly) */
#define IP_FRAGMENTS_ON
#define IP_MAX_FRAG_PACKETS              (4)
#define IP_MAX_FRAGS_PER_PACKET         (10)
#define IP_BIGPACKET_SIZE             (1500)
#define IP_FRAG_REASSEMBLY_TIMEOUT  (4000ul)


/* TCP
   TCP_MAX_SOCKETS: we need a control + data connection at the same time.
   4 gives some headroom (e.g. while a connection is still closing). */
#ifdef COMPILE_TCP
#define TCP_MAX_SOCKETS          (4)   /* only 8 bits               */
#define TCP_MAX_XMIT_BUFS       (20)   /* only 8 bits               */
#define TCP_SOCKET_RING_SIZE     (4)   /* power of two              */
#define TCP_CLOSE_TIMEOUT  (10000ul)
/* No TCP_LISTEN_CODE: we only use PASV (outgoing connect). */
#endif


/* UDP (only for DNS) */
#ifdef COMPILE_UDP
#define UDP_MAX_CALLBACKS (5)
#endif


/* DNS */
#ifdef COMPILE_DNS
#define DNS_MAX_NAME_LEN  (128)
#define DNS_MAX_ENTRIES     (1)        /* 7 bits (max 127)         */
#define DNS_HANDLER_PORT   (57)
#define DNS_RECURSION_DESIRED  (1)
#define DNS_INITIAL_SEND_TIMEOUT   (500ul)   /*  0.5 s             */
#define DNS_RETRY_THRESHOLD       (2000ul)   /*  2   s             */
#define DNS_TIMEOUT              (10000ul)   /* 10   s             */
#endif


#endif
